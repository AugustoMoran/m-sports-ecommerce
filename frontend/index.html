<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon-logo.png" sizes="192x192" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#2563eb" />
    <title>Mi Tienda Online</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <!-- Mercado Pago SDK - Loaded early to prevent race conditions -->
    <script>
      // Load MP SDK early with error handling
      const script = document.createElement('script');
      script.src = 'https://sdk.mercadopago.com/js/v2';
      script.onerror = () => console.warn('⚠️ Failed to load Mercado Pago SDK from CDN');
      document.head.appendChild(script);
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
