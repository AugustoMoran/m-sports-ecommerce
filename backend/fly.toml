app = "m-sports-backend"
primary_region = "gru"

[build]
  dockerfile = "Dockerfile"
  build-args = { CACHEBUST = "FORCE_REBUILD_20260501_031100" }

[env]
  NODE_ENV = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
